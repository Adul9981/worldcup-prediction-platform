<!doctype html>
<html lang="zh-CN">

    <meta charset="utf-8" />

    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />

    <header class="topbar">
      <div>
        <p class="eyebrow">本地只读入口</p>
        <h1>世界杯预测市场</h1>
      </div>
      <div class="top-actions">
        <a class="nav-link-subscribe" href="./subscribe.html">🔓 订阅解锁</a>
      </div>

    <main>
      <section class="market-core">

            <a class="market-link" href="./events.html">打开事件库</a>

          <article class="focus-card">
            <h2>进度纵览</h2>
            <p>查看全部比赛的已结束、今日和后续状态。</p>
            <a class="market-link" href="./progress.html">打开进度页</a>

    <footer>
